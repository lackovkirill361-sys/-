<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Бро-Проекты | Полная версия</title>
    <style>
        body {
            font-family: system-ui, 'Segoe UI', monospace;
            background: #0b1120;
            color: #e2e8f0;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            background: #1e293b;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        button {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        .export-btn {
            background: #10b981;
        }
        .change-name-btn {
            background: #f59e0b;
        }
        .dev-btn {
            background: #8b5cf6;
        }
        .drop-zone {
            border: 3px dashed #3b82f6;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin: 20px 0;
            transition: all 0.3s;
            background: #1e293b;
        }
        .drop-zone.drag-over {
            border-color: #10b981;
            background: #0f172a;
        }
        .project-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #10b981;
        }
        .project-name {
            font-weight: bold;
            font-size: 18px;
            color: #facc15;
        }
        .project-desc {
            color: #94a3b8;
            margin: 8px 0;
            font-style: italic;
            background: #0f172a;
            padding: 8px 12px;
            border-radius: 12px;
        }
        .project-meta {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
        }
        .download-btn {
            background: #3b82f6;
            padding: 8px 16px;
            text-decoration: none;
            color: white;
            border-radius: 40px;
            font-size: 14px;
            display: inline-block;
        }
        .delete-btn {
            background: #ef4444;
            padding: 8px 12px;
            margin-left: 10px;
            font-size: 14px;
            border: none;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .delete-disabled {
            background: #7f8c8d;
            cursor: not-allowed;
            opacity: 0.5;
        }
        .comments-section {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #334155;
        }
        .comments-title {
            font-size: 14px;
            font-weight: bold;
            color: #94a3b8;
            margin-bottom: 10px;
        }
        .comment {
            background: #0f172a;
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .comment-author {
            color: #facc15;
            font-weight: bold;
            font-size: 12px;
        }
        .comment-text {
            color: #cbd5e1;
            font-size: 13px;
            margin-top: 4px;
        }
        .comment-time {
            font-size: 10px;
            color: #64748b;
            margin-top: 4px;
        }
        .add-comment {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .comment-input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 40px;
            border: none;
            background: #334155;
            color: white;
            font-family: inherit;
        }
        .send-comment-btn {
            background: #3b82f6;
            padding: 8px 16px;
            margin: 0;
        }
        .status {
            background: #1e293b;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
        }
        .user-info {
            background: #0f172a;
            padding: 8px 15px;
            border-radius: 40px;
            display: inline-block;
            margin-bottom: 10px;
        }
        .dev-badge {
            background: #ec489a;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            margin-left: 8px;
        }
        input[type="file"] {
            display: none;
        }
        .total-size {
            font-size: 12px;
            color: #64748b;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>📦 Бро-Мультиплеер</h1>
    <div class="user-info" id="userInfo">👤 Загрузка...</div>
    <div>
        <button class="change-name-btn" id="changeNameBtn">✏️ Сменить имя</button>
        <button class="dev-btn" id="devBtn">🔐 Стать разработчиком</button>
        <button class="export-btn" id="exportBtn">📤 ЭКСПОРТ</button>
        <button id="refreshBtn">🔄 Обновить</button>
    </div>
    <input type="file" id="fileInput">
</div>

<div class="drop-zone" id="dropZone">
    📁 **Перетащи файл сюда** (или нажми кнопку ЭКСПОРТ)
    <br>
    <small>Максимум 50 МБ</small>
</div>

<div id="projectList" class="status">📡 Загрузка проектов...</div>
<div class="total-size" id="totalSize"></div>

<script>
    const STORAGE_KEY = 'bromultiprojects_full';
    const USER_NAME_KEY = 'brousername';
    const DEV_KEY = 'brosisdev';

    function getUserName() {
        let name = localStorage.getItem(USER_NAME_KEY);
        if (!name) {
            name = prompt("👋 Введи своё имя:", "Бро") || "Аноним";
            localStorage.setItem(USER_NAME_KEY, name);
        }
        return name;
    }

    function isDev() {
        return localStorage.getItem(DEV_KEY) === 'true';
    }

    function becomeDev() {
        if (isDev()) {
            alert("Ты уже разработчик!");
            return;
        }
        const password = prompt("🔐 Введи пароль:", "");
        if (password === "88198199") {
            localStorage.setItem(DEV_KEY, 'true');
            updateUserDisplay();
            alert("✅ Ты разработчик! Можешь удалять любые проекты.");
        } else if (password) {
            alert("❌ Неверный пароль.");
        }
    }

    function updateUserDisplay() {
        const name = getUserName();
        const dev = isDev();
        document.getElementById('userInfo').innerHTML = dev ? `👑 ${name} <span class="dev-badge">РАЗРАБОТЧИК</span>` : `👤 ${name}`;
    }

    function changeUserName() {
        const newName = prompt("✏️ Новое имя:", getUserName());
        if (newName && newName.trim()) {
            localStorage.setItem(USER_NAME_KEY, newName.trim());
            updateUserDisplay();
            alert(`✅ Теперь ты ${newName}`);
        }
    }

    function getProjects() {
        const stored = localStorage.getItem(STORAGE_KEY);
        return stored ? JSON.parse(stored) : [];
    }

    function saveProjects(projects) {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
            return true;
        } catch (e) {
            if (e.name === 'QuotaExceededError') {
                alert("❌ Слишком много файлов! Браузер не может сохранить больше ~10 МБ. Удали старые проекты.");
            }
            return false;
        }
    }

    function addComment(projectIndex, commentText) {
        const projects = getProjects();
        if (projectIndex >= 0 && projectIndex < projects.length && commentText.trim()) {
            if (!projects[projectIndex].comments) projects[projectIndex].comments = [];
            projects[projectIndex].comments.push({
                author: getUserName(),
                text: commentText.trim(),
                timestamp: Date.now()
            });
            saveProjects(projects);
            renderProjects();
        }
    }

    function canDeleteProject(project) {
        return isDev() || project.author === getUserName();
    }

    function deleteProject(index) {
        const projects = getProjects();
        const project = projects[index];
        if (canDeleteProject(project)) {
            if (confirm(`🗑️ Удалить "${project.name}"?`)) {
                projects.splice(index, 1);
                saveProjects(projects);
                renderProjects();
            }
        } else {
            alert("❌ Удалять могут только автор или разработчик.");
        }
    }

    function uploadFile(file) {
        if (!file) return;
        
        if (file.size > 50 * 1024 * 1024) {
            alert("❌ Файл больше 50 МБ!");
            return;
        }
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const description = prompt("📝 Описание проекта:", file.name) || "Без описания";
            const projects = getProjects();
            projects.push({
                name: file.name,
                size: file.size,
                data: e.target.result,
                author: getUserName(),
                description: description,
                timestamp: Date.now(),
                comments: []
            });
            if (saveProjects(projects)) {
                renderProjects();
                alert(`✅ "${file.name}" добавлен!`);
            }
        };
        reader.readAsDataURL(file);
    }

    function renderProjects() {
        const container = document.getElementById('projectList');
        const projects = getProjects();
        const currentUser = getUserName();
        
        if (projects.length === 0) {
            container.innerHTML = '😢 Проектов нет. Нажми «ЭКСПОРТ» или перетащи файл.';
            document.getElementById('totalSize').innerHTML = '';
            return;
        }
        
        let totalSize = 0;
        let html = '';
        projects.forEach((proj, index) => {
            totalSize += proj.size || 0;
            const userCanDelete = canDeleteProject(proj);
            const deleteClass = userCanDelete ? 'delete-btn' : 'delete-btn delete-disabled';
            const authorDisplay = proj.author === currentUser ? `${escapeHtml(proj.author)} (это ты)` : escapeHtml(proj.author);
            
            let commentsHtml = '';
            if (proj.comments && proj.comments.length > 0) {
                commentsHtml = `<div class="comments-title">💬 Комментарии (${proj.comments.length}):</div>`;
                proj.comments.forEach(comment => {
                    commentsHtml += `
                        <div class="comment">
                            <div class="comment-author">${escapeHtml(comment.author)}</div>
                            <div class="comment-text">${escapeHtml(comment.text)}</div>
                            <div class="comment-time">${new Date(comment.timestamp).toLocaleString()}</div>
                        </div>
                    `;
                });
            }
            
            html += `
                <div class="project-card">
                    <div class="project-name">📄 ${escapeHtml(proj.name)}</div>
                    <div class="project-desc">📝 ${escapeHtml(proj.description)}</div>
                    <div class="project-meta">📦 ${(proj.size / 1024 / 1024).toFixed(2)} МБ • 👤 ${authorDisplay} • 🕒 ${new Date(proj.timestamp).toLocaleString()}</div>
                    <div>
                        <a class="download-btn" href="${proj.data}" download="${escapeHtml(proj.name)}">⬇️ Скачать</a>
                        <button class="${deleteClass}" data-index="${index}">🗑️ Удалить</button>
                    </div>
                    <div class="comments-section">
                        ${commentsHtml}
                        <div class="add-comment">
                            <input type="text" class="comment-input" id="comment-input-${index}" placeholder="Напиши комментарий...">
                            <button class="send-comment-btn" data-index="${index}">📝 Отправить</button>
                        </div>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
        document.getElementById('totalSize').innerHTML = `💾 Всего: ${projects.length} проект(ов) | ${(totalSize / 1024 / 1024).toFixed(2)} МБ / ~10 МБ (максимум)`;
        
        document.querySelectorAll('.delete-btn:not(.delete-disabled)').forEach(btn => {
            btn.addEventListener('click', (e) => deleteProject(parseInt(btn.dataset.index)));
        });
        
        document.querySelectorAll('.send-comment-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.index);
                const input = document.getElementById(`comment-input-${idx}`);
                if (input.value.trim()) {
                    addComment(idx, input.value);
                    input.value = '';
                }
            });
        });
        
        document.querySelectorAll('.comment-input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const idx = parseInt(input.id.split('-').pop());
                    if (input.value.trim()) {
                        addComment(idx, input.value);
                        input.value = '';
                    }
                }
            });
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    // Drag & Drop
    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        if (e.dataTransfer.files.length > 0) uploadFile(e.dataTransfer.files[0]);
    });

    document.getElementById('exportBtn').addEventListener('click', () => document.getElementById('fileInput').click());
    document.getElementById('fileInput').addEventListener('change', (e) => { if (e.target.files.length > 0) uploadFile(e.target.files[0]); e.target.value = ''; });
    document.getElementById('refreshBtn').addEventListener('click', () => renderProjects());
    document.getElementById('changeNameBtn').addEventListener('click', () => changeUserName());
    document.getElementById('devBtn').addEventListener('click', () => becomeDev());

    updateUserDisplay();
    renderProjects();
    setInterval(() => renderProjects(), 10000);
</script>

</body>
</html>
