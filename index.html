<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Бро-Проекты | IndexedDB 150 МБ</title>
    <style>
        body {
            font-family: system-ui;
            background: #0b1120;
            color: #e2e8f0;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            background: #1e293b;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }
        button {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 40px;
            cursor: pointer;
        }
        .export-btn { background: #10b981; }
        .change-name-btn { background: #f59e0b; }
        .dev-btn { background: #8b5cf6; }
        .drop-zone {
            border: 3px dashed #3b82f6;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin: 20px 0;
            background: #1e293b;
        }
        .drop-zone.drag-over {
            border-color: #10b981;
            background: #0f172a;
        }
        .project-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #10b981;
        }
        .project-name { font-weight: bold; font-size: 18px; color: #facc15; }
        .project-desc { color: #94a3b8; margin: 8px 0; background: #0f172a; padding: 8px; border-radius: 12px; }
        .download-btn { background: #3b82f6; padding: 8px 16px; text-decoration: none; color: white; border-radius: 40px; display: inline-block; }
        .delete-btn { background: #ef4444; padding: 8px 12px; margin-left: 10px; border: none; border-radius: 40px; color: white; cursor: pointer; }
        .user-info { background: #0f172a; padding: 8px 15px; border-radius: 40px; display: inline-block; margin-bottom: 10px; }
        .dev-badge { background: #ec489a; padding: 2px 8px; border-radius: 20px; font-size: 10px; margin-left: 8px; }
        input[type="file"] { display: none; }
        .total-size { font-size: 12px; color: #64748b; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <h1>📦 Бро-Мультиплеер (150 МБ)</h1>
    <div class="user-info" id="userInfo">👤 Загрузка...</div>
    <div>
        <button class="change-name-btn" id="changeNameBtn">✏️ Сменить имя</button>
        <button class="dev-btn" id="devBtn">🔐 Стать разработчиком</button>
        <button class="export-btn" id="exportBtn">📤 ЭКСПОРТ (до 150 МБ)</button>
        <button id="refreshBtn">🔄 Обновить</button>
    </div>
    <input type="file" id="fileInput">
</div>

<div class="drop-zone" id="dropZone">
    📁 **Перетащи файл сюда** (максимум 150 МБ)
</div>

<div id="projectList">📡 Загрузка...</div>
<div class="total-size" id="totalSize"></div>

<script>
    const DB_NAME = 'BroProjectsDB';
    const DB_VERSION = 1;
    const STORE_NAME = 'projects';
    const MAX_SIZE_MB = 150;
    const MAX_SIZE_BYTES = MAX_SIZE_MB * 1024 * 1024;
    
    const USER_NAME_KEY = 'brousername';
    const DEV_KEY = 'brosisdev';
    
    let db = null;

    function getUserName() {
        let name = localStorage.getItem(USER_NAME_KEY);
        if (!name) {
            name = prompt("👋 Введи своё имя:", "Бро") || "Аноним";
            localStorage.setItem(USER_NAME_KEY, name);
        }
        return name;
    }

    function isDev() {
        return localStorage.getItem(DEV_KEY) === 'true';
    }

    function becomeDev() {
        if (isDev()) { alert("Ты уже разработчик!"); return; }
        const password = prompt("🔐 Введи пароль:", "");
        if (password === "88198199") {
            localStorage.setItem(DEV_KEY, 'true');
            updateUserDisplay();
            alert("✅ Ты разработчик!");
        } else if (password) alert("❌ Неверный пароль.");
    }

    function updateUserDisplay() {
        const name = getUserName();
        const dev = isDev();
        document.getElementById('userInfo').innerHTML = dev ? `👑 ${name} <span class="dev-badge">РАЗРАБОТЧИК</span>` : `👤 ${name}`;
    }

    function changeUserName() {
        const newName = prompt("✏️ Новое имя:", getUserName());
        if (newName && newName.trim()) {
            localStorage.setItem(USER_NAME_KEY, newName.trim());
            updateUserDisplay();
            alert(`✅ Теперь ты ${newName}`);
        }
    }

    function openDatabase() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => resolve(request.result);
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                }
            };
        });
    }

    async function getProjects() {
        if (!db) db = await openDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], 'readonly');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.getAll();
            request.onsuccess = () => resolve(request.result || []);
            request.onerror = () => reject(request.error);
        });
    }

    async function saveProject(project) {
        if (!db) db = await openDatabase();
        
        // Проверка общего размера
        const projects = await getProjects();
        let totalSize = 0;
        for (const p of projects) totalSize += p.size || 0;
        
        if (totalSize + project.size > MAX_SIZE_BYTES) {
            alert(`❌ Превышен общий лимит ${MAX_SIZE_MB} МБ! Удали старые проекты.`);
            return false;
        }
        
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.add(project);
            request.onsuccess = () => resolve(true);
            request.onerror = () => reject(request.error);
        });
    }

    async function deleteProject(id) {
        if (!db) db = await openDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.delete(id);
            request.onsuccess = () => resolve(true);
            request.onerror = () => reject(request.error);
        });
    }

    async function uploadFile(file) {
        if (!file) return;
        
        if (file.size > MAX_SIZE_BYTES) {
            alert(`❌ Файл больше ${MAX_SIZE_MB} МБ!`);
            return;
        }
        
        const reader = new FileReader();
        reader.onload = async function(e) {
            const description = prompt("📝 Описание проекта:", file.name) || "Без описания";
            const success = await saveProject({
                name: file.name,
                size: file.size,
                data: e.target.result,
                author: getUserName(),
                description: description,
                timestamp: Date.now(),
                comments: []
            });
            if (success) {
                await renderProjects();
                alert(`✅ "${file.name}" добавлен!`);
            }
        };
        reader.readAsDataURL(file);
    }

    async function addComment(projectId, commentText) {
        if (!commentText.trim()) return;
        const projects = await getProjects();
        const project = projects.find(p => p.id === projectId);
        if (project) {
            if (!project.comments) project.comments = [];
            project.comments.push({
                author: getUserName(),
                text: commentText.trim(),
                timestamp: Date.now()
            });
            if (!db) db = await openDatabase();
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            store.put(project);
            await renderProjects();
        }
    }

    async function deleteProjectById(id, author) {
        const canDelete = isDev() || author === getUserName();
        if (!canDelete) {
            alert("❌ Удалять могут только автор или разработчик.");
            return;
        }
        if (confirm("🗑️ Удалить проект?")) {
            await deleteProject(id);
            await renderProjects();
        }
    }

    async function renderProjects() {
        const projects = await getProjects();
        const container = document.getElementById('projectList');
        const currentUser = getUserName();
        
        if (projects.length === 0) {
            container.innerHTML = '😢 Проектов нет. Нажми «ЭКСПОРТ» или перетащи файл.';
            document.getElementById('totalSize').innerHTML = '';
            return;
        }
        
        let totalSize = 0;
        let html = '';
        for (const proj of projects) {
            totalSize += proj.size || 0;
            const userCanDelete = isDev() || proj.author === currentUser;
            const deleteClass = userCanDelete ? 'delete-btn' : 'delete-btn';
            const authorDisplay = proj.author === currentUser ? `${escapeHtml(proj.author)} (это ты)` : escapeHtml(proj.author);
            
            let commentsHtml = '';
            if (proj.comments && proj.comments.length > 0) {
                commentsHtml = `<div style="margin-top:10px;"><b>💬 Комментарии:</b></div>`;
                proj.comments.forEach(comment => {
                    commentsHtml += `
                        <div style="background:#0f172a; padding:8px; border-radius:12px; margin-top:5px;">
                            <span style="color:#facc15;">${escapeHtml(comment.author)}</span><br>
                            <span style="font-size:13px;">${escapeHtml(comment.text)}</span><br>
                            <span style="font-size:10px; color:#64748b;">${new Date(comment.timestamp).toLocaleString()}</span>
                        </div>
                    `;
                });
            }
            
            html += `
                <div class="project-card">
                    <div class="project-name">📄 ${escapeHtml(proj.name)}</div>
                    <div class="project-desc">📝 ${escapeHtml(proj.description)}</div>
                    <div class="project-meta">📦 ${(proj.size / 1024 / 1024).toFixed(2)} МБ • 👤 ${authorDisplay} • 🕒 ${new Date(proj.timestamp).toLocaleString()}</div>
                    <div>
                        <a class="download-btn" href="${proj.data}" download="${escapeHtml(proj.name)}">⬇️ Скачать</a>
                        <button class="${deleteClass}" onclick="deleteProjectById(${proj.id}, '${proj.author}')">🗑️ Удалить</button>
                    </div>
                    ${commentsHtml}
                    <div style="margin-top:10px;">
                        <input type="text" id="comment-${proj.id}" placeholder="Напиши комментарий..." style="padding:8px; border-radius:20px; border:none; width:70%;">
                        <button onclick="addComment(${proj.id}, document.getElementById('comment-${proj.id}').value)">📝 Отправить</button>
                    </div>
                </div>
            `;
        }
        
        container.innerHTML = html;
        document.getElementById('totalSize').innerHTML = `💾 Всего: ${projects.length} проект(ов) | ${(totalSize / 1024 / 1024).toFixed(2)} МБ / ${MAX_SIZE_MB} МБ`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    // Глобальные функции для onclick
    window.deleteProjectById = deleteProjectById;
    window.addComment = addComment;

    // Drag & Drop
    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', async (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        if (e.dataTransfer.files.length > 0) await uploadFile(e.dataTransfer.files[0]);
    });

    document.getElementById('exportBtn').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = async (e) => { if (e.target.files.length > 0) await uploadFile(e.target.files[0]); e.target.value = ''; };
    document.getElementById('refreshBtn').onclick = () => renderProjects();
    document.getElementById('changeNameBtn').onclick = () => changeUserName();
    document.getElementById('devBtn').onclick = () => becomeDev();

    (async () => {
        db = await openDatabase();
        updateUserDisplay();
        await renderProjects();
    })();
</script>

</body>
</html>
